services:
  - type: web
    name: gita-wisdom-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PIP_NO_BUILD_ISOLATION
        value: "false"
      - key: GOOGLE_API_KEY
        sync: false        # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false        # set to your Vercel URL after deploy, e.g. https://gita-wisdom.vercel.app
